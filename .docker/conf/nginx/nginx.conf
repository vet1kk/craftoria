server {
    listen 8080 default_server;
    listen 80 default_server;
    server_name _;

    root /home/site/wwwroot/webroot;
    index index.php index.html;

    add_header X-Config-Status "FORCE-ACTIVE-V4" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /home/site/wwwroot/webroot/index.php;
        fastcgi_param DOCUMENT_ROOT /home/site/wwwroot/webroot;
    }
}