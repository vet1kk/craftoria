services:
  web:
    image: nginx:stable
    container_name: craftoria-web
    volumes:
      - ./.docker/conf/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    ports:
      - "8009:80"
    restart: always
    depends_on:
      - php
      - db
  php:
    build: .
    container_name: craftoria-php
    image: craftoria/php
    restart: always
    environment:
      XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host.docker.internal}
      PHP_IDE_CONFIG: "serverName=Craftoria"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    container_name: craftoria-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-craftoria}
      POSTGRES_USER: ${DB_USERNAME:-craftoria}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-craftoria}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5609:5432"
    volumes:
      - .:/app
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: { }
