<footer class="mt-12 border-t border-stone-200 bg-stone-100 py-8">
  <div class="mx-auto max-w-4xl px-4">
    <div class="flex flex-col items-center gap-4">
      <div class="inline-flex items-center rounded-full border border-stone-200 bg-white p-1">
        <button type="button"
                (click)="setLocale('en')"
                class="rounded-full px-3 py-1 text-xs font-semibold transition-colors"
                [class.bg-stone-900]="localeService.locale() === 'en'"
                [class.text-white]="localeService.locale() === 'en'"
                [class.text-stone-500]="localeService.locale() !== 'en'">
          EN
        </button>
        <button type="button"
                (click)="setLocale('ua')"
                class="rounded-full px-3 py-1 text-xs font-semibold transition-colors"
                [class.bg-stone-900]="localeService.locale() === 'ua'"
                [class.text-white]="localeService.locale() === 'ua'"
                [class.text-stone-500]="localeService.locale() !== 'ua'">
          UA
        </button>
      </div>
      <div class="text-center text-sm text-stone-500">
        <p>{{ 'ui.footer.copyright' | t }}</p>
        <p>{{ 'ui.footer.developedBy' | t }}</p>
      </div>
    </div>
  </div>
</footer>
