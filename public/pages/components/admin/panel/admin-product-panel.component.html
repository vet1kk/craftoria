<div class="overflow-hidden rounded-2xl border border-stone-100 bg-white shadow-sm">
  <div class="flex flex-col items-start gap-2 border-b border-stone-100 bg-stone-50 p-6 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-lg font-bold text-stone-700">{{ 'ui.admin.itemsTitle' | t }}</h2>
  </div>

  <div>
    @for (item of products(); track item.id) {
      <div class="flex flex-col gap-4 p-4 transition-colors hover:bg-stone-50 sm:flex-row sm:items-center">
        @if (item.image_url) {
          <img [src]="item.image_url"
               [alt]="item.name"
               width="120"
               height="120"
               loading="lazy"
               class="h-12 w-12 rounded-lg bg-stone-200 object-cover">
        } @else {
          <div class="relative flex h-24 w-24 items-center justify-center flex-col overflow-hidden rounded-lg bg-stone-100">
            <span class="relative text-lg opacity-50">📷</span>
          </div>
        }
        <div class="min-w-0 flex-1">
          <h3 class="truncate font-medium text-stone-800">{{ item.name }}</h3>
          <div class="flex flex-wrap items-center gap-2 text-xs text-stone-500">
            <span>{{ getCategoryName(item.category_id) }}</span>
            <span>•</span>
            <span>{{ item.price }} {{ currency() }}</span>
            @if (!item.available) {
              <span class="font-bold text-red-500">• {{ 'ui.admin.outOfStock' | t }}</span>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
