<div class="overflow-hidden rounded-2xl border border-stone-100 bg-white shadow-sm">
  <div class="flex flex-col items-start gap-2 border-b border-stone-100 bg-stone-50 p-6 sm:flex-row sm:items-center sm:justify-between">
    <h2 class="text-lg font-bold text-stone-700">{{ 'ui.admin.categoriesTitle' | t }}</h2>
    <span class="text-sm text-stone-500">{{ 'ui.admin.viewOnlyHint' | t }}</span>
  </div>

  <div class="divide-y divide-stone-100">
    @for (category of categories(); track category.id) {
      <div class="flex flex-col gap-3 p-4 hover:bg-stone-50 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex min-w-0 items-center gap-3">
          <img [src]="category.imageUrl"
               [alt]="category.name"
               width="48"
               height="48"
               loading="lazy"
               class="h-10 w-16 rounded-lg border border-stone-200 bg-stone-100 object-cover">
          <div class="min-w-0">
            <span class="block font-medium text-stone-800">{{ category.name }}</span>
            <span class="text-xs text-stone-500">{{ category.icon }} {{ 'ui.admin.categoryImage' | t }}</span>
          </div>
        </div>
        <span class="text-xs font-medium uppercase tracking-wide text-stone-400 sm:text-right">{{ 'ui.admin.managedByApi' | t }}</span>
      </div>
    }
  </div>
</div>
