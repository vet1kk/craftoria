<div class="sticky top-0 z-40 overflow-x-auto border-b border-stone-200 bg-white/95 shadow-sm backdrop-blur-md md:top-22">
  <div class="mx-auto flex min-w-max gap-2 px-3 py-2 sm:max-w-4xl sm:px-4 sm:py-3">
    <button type="button"
            (click)="categoryChange.emit(null)"
            [class]="!selectedCategory() ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'"
            class="flex items-center gap-2 whitespace-nowrap rounded-full px-3 py-1.5 text-sm font-medium transition-colors sm:px-4 sm:py-2">
      <span>🍽 Усе</span>
    </button>

    @for (category of categories(); track category.id) {
      <button type="button"
              (click)="categoryChange.emit(category.id)"
              [class]="selectedCategory() === category.id ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'"
              class="flex items-center gap-2 whitespace-nowrap rounded-full px-3 py-1.5 text-sm font-medium transition-colors sm:px-4 sm:py-2">
        <img [ngSrc]="category.imageUrl"
             [alt]="category.name"
             width="24"
             height="24"
             class="h-7 w-7 rounded-full border border-white/50 object-cover">
        <span>{{ category.name }}</span>
      </button>
    }
  </div>
</div>
