<div class="border-b border-stone-200 bg-stone-50/98 px-3 py-2 shadow-sm sm:px-4 sm:py-3">
  <div class="mx-auto max-w-4xl rounded-2xl border border-stone-200 bg-stone-50/98 px-3 py-2 sm:px-4">
    <div class="overflow-x-auto py-3">
      <div class="flex w-max min-w-full gap-2">
        @for (category of categories(); track category.id) {
          <button type="button"
                  (click)="categoryChange.emit(category.slug)"
                  [attr.aria-pressed]="selectedCategorySlug() === category.slug"
                  [class]="selectedCategorySlug() === category.slug ? 'bg-stone-800 text-white shadow-sm' : 'bg-white text-stone-600 hover:bg-stone-100'"
                  class="flex items-center gap-2 whitespace-nowrap rounded-full border border-stone-200 px-3 py-1.5 text-sm font-medium transition-colors sm:px-4 sm:py-2">
            @if (category.slug === 'all') {
              <span class="flex h-7 w-7 items-center justify-center rounded-full bg-orange-100 text-sm">
                {{ category.icon }}
              </span>
            } @else if (category.imageUrl) {
              <img [src]="category.imageUrl"
                   [alt]="category.name"
                   width="24"
                   height="24"
                   loading="lazy"
                   class="h-7 w-7 rounded-full border border-white/50 object-cover">
            } @else {
              <span class="flex h-7 w-7 items-center justify-center rounded-full bg-stone-100 text-sm">📷</span>
            }
            <span>{{ category.name }}</span>
          </button>
        }
      </div>
    </div>
  </div>
</div>
