<div class="sticky top-0 z-10 w-full border-b border-stone-100 bg-white/80 backdrop-blur-md">
  <div class="mx-auto max-w-7xl px-4">
    <div class="flex items-center gap-3 py-4 justify-center flex-wrap">
      @for (category of categories(); track category.id) {
        <button type="button"
                (click)="categoryChange.emit(category.slug)"
                [attr.aria-pressed]="isSelected(category.slug)"
                class="group relative flex shrink-0 items-center gap-2 rounded-xl border px-4 py-2 transition-all duration-200"
                [class]="isSelected(category.slug)
            ? 'border-orange-500 bg-orange-50 text-orange-900 shadow-sm'
            : 'border-stone-200 bg-white text-stone-600 hover:border-stone-300 hover:bg-stone-50'">
          <div class="relative h-6 w-6 overflow-hidden rounded-full">
            @if (category.slug === 'all') {
              <div class="flex h-full w-full items-center justify-center bg-stone-100 text-xs">
                {{ category.icon || '✨' }}
              </div>
            } @else if (category.image_url) {
              <img [src]="category.image_url"
                   [alt]="category.name"
                   class="h-full w-full object-cover transition-transform group-hover:scale-110">
            } @else {
              <div class="flex h-full w-full items-center justify-center bg-stone-50 text-[10px]">
                📦
              </div>
            }
          </div>

          <span class="text-sm font-semibold tracking-tight">
            {{ category.name }}
          </span>

          @if (isSelected(category.slug)) {
            <span class="absolute -right-1 -top-1 flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
            </span>
          }
        </button>
      }
    </div>
  </div>
</div>
