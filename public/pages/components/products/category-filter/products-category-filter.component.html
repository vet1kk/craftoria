<div class="sticky top-0 z-20 w-full border-b border-stone-100 bg-white/90 backdrop-blur-md">
  <div class="mx-auto max-w-7xl px-4 py-3">

    <div class="flex items-center justify-between md:hidden gap-4">
      <div class="flex items-center gap-3 flex-wrap">
        <span class="text-xs font-black uppercase tracking-widest text-stone-400">{{ 'ui.products.selectedCategory' | t }}</span>
        <span class="text-sm font-bold text-orange-600">{{ activeCategoryName() }}</span>
      </div>

      <button type="button"
              (click)="isMenuOpen.set(!isMenuOpen())"
              class="flex h-10 w-10 items-center justify-center rounded-xl bg-stone-50 border border-stone-200 text-stone-600 active:bg-stone-100">
        @if (!isMenuOpen()) {
          <span class="text-xl">☰</span>
        } @else {
          <span class="text-xl">✕</span>
        }
      </button>
    </div>

    <div [class.hidden]="!isMenuOpen()"
         class="mt-4 flex flex-col gap-2 md:mt-0 md:flex md:flex-row md:flex-wrap md:items-center md:justify-center md:gap-3">

      @for (category of categories(); track category.id) {
        <button type="button"
                (click)="selectCategory(category.slug)"
                class="group relative flex items-center gap-3 rounded-2xl border p-2 pr-4 transition-all md:rounded-xl md:px-4 md:py-2"
                [class]="isSelected(category.slug)
                  ? 'border-orange-500 bg-orange-50 text-orange-900 shadow-sm'
                  : 'border-stone-100 bg-white text-stone-600 hover:border-stone-200'">

          <div class="relative h-8 w-8 shrink-0 overflow-hidden rounded-full border border-stone-100 bg-white md:h-6 md:w-6">
            @if (category.image_url) {
              <img [src]="category.image_url" class="h-full w-full object-cover" alt="">
            } @else {
              <div class="flex h-full w-full items-center justify-center bg-stone-50 text-xs"> 📦</div>
            }
          </div>

          <span class="text-sm font-bold tracking-tight md:font-semibold">
            {{ category.name }}
          </span>

          @if (isSelected(category.slug)) {
            <span class="absolute -right-1 -top-1 flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
            </span>
          }
        </button>
      }
    </div>
  </div>
</div>
