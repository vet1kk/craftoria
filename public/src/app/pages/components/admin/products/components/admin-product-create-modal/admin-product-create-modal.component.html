<form class="relative z-10 w-full max-w-[calc(100vw-1rem)] overflow-y-auto overscroll-contain rounded-3xl border border-stone-100 bg-white p-4 shadow-sm max-h-[calc(100dvh-1rem)] sm:max-h-[calc(100dvh-3rem)] sm:max-w-2xl sm:p-8"
      [formGroup]="productForm"
      (ngSubmit)="submit()">
  @if (isBusy()) {
    <div class="absolute inset-0 z-20 flex items-center justify-center rounded-3xl bg-white/75 backdrop-blur-[1px]">
      <div class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-white px-4 py-2 text-sm font-semibold text-stone-700 shadow-sm">
        <ui-loader [label]="busyActionLabel()" tone="dark"></ui-loader>
      </div>
    </div>
  }

  <div class="flex items-start justify-between gap-3">
    <h3 class="text-xl font-bold text-stone-800">{{ 'ui.admin.productCreateTitle' | t }}</h3>
    <button type="button"
            [disabled]="isBusy()"
            class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 text-lg font-semibold leading-none text-stone-500 transition-all hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600"
            (click)="closeRequested.emit()">×
    </button>
  </div>

  <app-admin-product-form-fields
          [validationGroupName]="formGroupName"
          [productForm]="productForm"
          [categoryOptions]="categoryOptions()"
          [selectedImageName]="selectedImageName()"
          (imageSelected)="onImageSelected($event)">
  </app-admin-product-form-fields>

  @if (actionError()) {
    <div class="mt-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ actionError() }}
    </div>
  }

  <div class="mt-6 flex flex-wrap justify-end gap-2">
    <ui-button type="button" variant="outline" rounded="full" [disabled]="isBusy()" (click)="closeRequested.emit()">
      {{ 'ui.admin.categoryCancelAction' | t }}
    </ui-button>
    <ui-button type="submit"
               variant="secondary"
               rounded="full"
               [disabled]="isSubmitDisabled()"
               [loading]="isBusy()"
               [loadingLabel]="busyActionLabel()">
      {{ 'ui.admin.productCreateAction' | t }}
    </ui-button>
  </div>
</form>
