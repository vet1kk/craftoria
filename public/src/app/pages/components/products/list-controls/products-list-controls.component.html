<section class="mb-6 rounded-2xl border border-stone-100 bg-white p-4 shadow-sm sm:p-5">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
    <p class="inline-flex items-center rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold text-stone-600">
      {{ resultsCount() }} {{ 'ui.products.resultsLabel' | t }}
    </p>

    @if (hasActiveControls()) {
      <button type="button"
              class="rounded-full border border-stone-200 px-3 py-1.5 text-xs font-semibold text-stone-700 transition-colors hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600"
              (click)="resetControls()">
        {{ 'ui.actions.clearFilters' | t }}
      </button>
    }
  </div>

  <div class="grid gap-3 md:grid-cols-2">
    <label class="grid gap-1 text-sm text-stone-600 md:col-span-2">
      <span>{{ 'ui.products.searchLabel' | t }}</span>
      <input type="search"
             [value]="searchQuery()"
             (input)="onSearchInput($event)"
             [placeholder]="'ui.products.searchPlaceholder' | t"
             class="w-full rounded-xl border border-stone-200 bg-white px-4 py-3 text-stone-800 transition-colors focus:border-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-100">
    </label>

    <label class="grid gap-1 text-sm text-stone-600">
      <span>{{ 'ui.products.availabilityLabel' | t }}</span>
      <select [value]="availabilityFilter()"
              (change)="onAvailabilityChange($event)"
              class="w-full rounded-xl border border-stone-200 bg-white px-4 py-3 text-stone-800 transition-colors focus:border-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-100">
        <option value="all">{{ 'ui.products.availabilityAll' | t }}</option>
        <option value="available">{{ 'ui.products.availabilityInStock' | t }}</option>
        <option value="unavailable">{{ 'ui.products.availabilityOutOfStock' | t }}</option>
      </select>
    </label>

    <label class="grid gap-1 text-sm text-stone-600">
      <span>{{ 'ui.products.sortLabel' | t }}</span>
      <select [value]="sortBy()"
              (change)="onSortChange($event)"
              class="w-full rounded-xl border border-stone-200 bg-white px-4 py-3 text-stone-800 transition-colors focus:border-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-100">
        <option value="position">{{ 'ui.products.sortByPosition' | t }}</option>
        <option value="nameAsc">{{ 'ui.products.sortByName' | t }}</option>
        <option value="priceAsc">{{ 'ui.products.sortByPriceAsc' | t }}</option>
        <option value="priceDesc">{{ 'ui.products.sortByPriceDesc' | t }}</option>
      </select>
    </label>
  </div>
</section>
