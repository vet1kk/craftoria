<div class="relative">
  <button type="button"
          [class]="buttonClassName()"
          (click)="toggle()"
          [attr.aria-expanded]="isOpen()"
          [attr.aria-label]="ariaLabelKey() | t">
    <span>{{ selectedLabelKey() | t }}</span>
    <span class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-stone-500">▾</span>
  </button>

  @if (isOpen()) {
    <div [class]="menuClassName()">
      @for (option of options(); track option.value) {
        <button type="button"
                [class]="optionClassName()"
                [class.bg-stone-100]="option.value === selectedValue()"
                (click)="select(option.value)">
          {{ option.labelKey | t }}
        </button>
      }
    </div>
  }
</div>
