<div>
  <label class="mb-2 block text-sm font-medium text-stone-700">
    {{ label() }}
    @if (required()) {
      <span class="ml-1 text-red-500">*</span>
    }
  </label>

  <app-verifiable-input [group]="validationGroup()" [field]="validationKey()">
    <select [formControl]="control()"
            [attr.multiple]="multiple() ? '' : null"
            [attr.size]="multiple() ? size() : null"
            (change)="onSelectionChange()"
            (blur)="onBlur()"
            class="ui-select w-full rounded-xl border px-4 py-3 text-stone-800 transition-colors focus:outline-none focus:ring-2"
            [class.ui-select-multiple]="multiple()"
            [class.border-stone-200]="!resolvedHasError()"
            [class.focus:border-orange-300]="!resolvedHasError()"
            [class.focus:ring-orange-100]="!resolvedHasError()"
            [class.border-red-300]="resolvedHasError()"
            [class.focus:border-red-400]="resolvedHasError()"
            [class.focus:ring-red-100]="resolvedHasError()">
      @if (!multiple() && placeholder()) {
        <option [ngValue]="null">{{ placeholder() }}</option>
      }

      @for (option of options(); track option.value) {
        @if (multiple()) {
          <option [value]="option.value" [disabled]="option.disabled ?? false">
            {{ option.label }}
          </option>
        } @else {
          <option [ngValue]="option.value" [disabled]="option.disabled ?? false">
            {{ option.label }}
          </option>
        }
      }
    </select>
  </app-verifiable-input>

  @if (resolvedHasError() && resolvedErrorMessage()) {
    <p class="mt-1 text-sm text-red-600">{{ resolvedErrorMessage() }}</p>
  }
</div>
