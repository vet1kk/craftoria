<button type="button"
        [disabled]="disabled()"
        class="inline-flex items-center justify-center font-semibold transition-all disabled:cursor-not-allowed disabled:opacity-50"
        [class.w-full]="fullWidth()"
        [class.rounded-lg]="rounded() === 'default'"
        [class.rounded-full]="rounded() === 'full'"
        [class.px-3]="size() === 'sm'"
        [class.py-1.5]="size() === 'sm'"
        [class.text-xs]="size() === 'sm'"
        [class.px-4]="size() === 'md'"
        [class.py-2]="size() === 'md'"
        [class.text-sm]="size() === 'md'"
        [class.px-6]="size() === 'lg'"
        [class.py-3]="size() === 'lg'"
        [class.text-base]="size() === 'lg'"
        [class.bg-orange-500]="variant() === 'primary'"
        [class.text-white]="variant() === 'primary' || variant() === 'secondary'"
        [class.hover:bg-orange-600]="variant() === 'primary' && !disabled()"
        [class.bg-stone-900]="variant() === 'secondary'"
        [class.hover:bg-stone-800]="variant() === 'secondary' && !disabled()"
        [class.border]="variant() === 'outline'"
        [class.border-stone-200]="variant() === 'outline'"
        [class.bg-white]="variant() === 'outline'"
        [class.text-stone-700]="variant() === 'outline'"
        [class.hover:border-orange-200]="variant() === 'outline' && !disabled()"
        [class.hover:bg-orange-50]="variant() === 'outline' && !disabled()"
        [class.hover:text-orange-600]="variant() === 'outline' && !disabled()"
        [class.bg-transparent]="variant() === 'ghost'"
        [class.text-stone-600]="variant() === 'ghost'"
        [class.hover:bg-stone-100]="variant() === 'ghost' && !disabled()"
        [class.hover:text-stone-900]="variant() === 'ghost' && !disabled()">
  <ng-content></ng-content>
</button>
