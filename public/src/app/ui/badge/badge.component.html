<span class="inline-flex items-center rounded-full px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.18em]"
      [class.border]="variant() === 'default'"
      [class.border-stone-200]="variant() === 'default'"
      [class.bg-stone-50]="variant() === 'default'"
      [class.text-stone-500]="variant() === 'default'"
      [class.bg-emerald-50]="variant() === 'success'"
      [class.text-emerald-700]="variant() === 'success'"
      [class.bg-amber-50]="variant() === 'warning'"
      [class.text-amber-700]="variant() === 'warning'"
      [class.bg-red-50]="variant() === 'error'"
      [class.text-red-700]="variant() === 'error'"
      [class.border-orange-200]="variant() === 'orange'"
      [class.bg-orange-50]="variant() === 'orange'"
      [class.text-orange-600]="variant() === 'orange'"
      [class.border-sky-200]="variant() === 'sky'"
      [class.bg-sky-50]="variant() === 'sky'"
      [class.text-sky-700]="variant() === 'sky'"
      [class.bg-blue-50]="variant() === 'info'"
      [class.text-blue-700]="variant() === 'info'">
  <ng-content></ng-content>
</span>
