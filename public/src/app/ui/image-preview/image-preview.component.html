<button type="button"
        [class]="buttonClass()"
        (click)="open()"
        [attr.aria-label]="alt()">
  <img [src]="src()"
       [alt]="alt()"
       [attr.width]="width()"
       [attr.height]="height()"
       [class]="thumbnailClass()">
</button>

<ui-modal [open]="isOpen()"
          [maxWidth]="modalMaxWidth()"
          (closeRequested)="close()">
  <section class="relative rounded-3xl border border-stone-100 bg-white p-3 shadow-xl sm:p-4">
    <button type="button"
            class="absolute right-3 top-3 z-10 inline-flex h-9 w-9 items-center justify-center rounded-full border border-stone-200 bg-white text-lg font-semibold leading-none text-stone-500 transition-colors hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600"
            (click)="close()">
      ×
    </button>

    <img [src]="src()"
         [alt]="alt()"
         [class]="fullImageClass()">
  </section>
</ui-modal>
