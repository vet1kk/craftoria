<div>
  @if (showLabel()) {
    <label class="mb-2 block text-sm font-medium text-stone-700">
      {{ label() }}
      @if (required()) {
        <span class="ml-1 text-red-500">*</span>
      }
    </label>
  }

  <div class="flex flex-wrap gap-2" (blur)="onBlur()" tabindex="0">
    @if (emptyOptionLabel()) {
      <button type="button"
              class="rounded-full border px-3 py-1 text-xs transition-colors"
              [class.border-orange-300]="isEmptySelected()"
              [class.bg-orange-50]="isEmptySelected()"
              [class.text-orange-700]="isEmptySelected()"
              [class.border-stone-200]="!isEmptySelected()"
              [class.bg-stone-50]="!isEmptySelected()"
              [class.text-stone-700]="!isEmptySelected()"
              [class.hover:bg-orange-50]="!isEmptySelected()"
              [class.hover:border-orange-200]="!isEmptySelected()"
              (click)="selectEmpty()">
        {{ emptyOptionLabel() }}
      </button>
    }

    @for (option of options(); track option.value) {
      <button type="button"
              class="rounded-full border px-3 py-1 text-xs transition-colors"
              [class.border-orange-300]="isSelected(option.value)"
              [class.bg-orange-50]="isSelected(option.value)"
              [class.text-orange-700]="isSelected(option.value)"
              [class.border-stone-200]="!isSelected(option.value)"
              [class.bg-stone-50]="!isSelected(option.value)"
              [class.text-stone-700]="!isSelected(option.value)"
              [class.hover:bg-orange-50]="!isSelected(option.value)"
              [class.hover:border-orange-200]="!isSelected(option.value)"
              [disabled]="option.disabled ?? false"
              (click)="select(option.value)">
        {{ option.label }}
      </button>
    }
  </div>

  @if (resolvedHasError() && resolvedErrorMessage()) {
    <p class="mt-1 text-sm text-red-600">{{ resolvedErrorMessage() }}</p>
  }
</div>
