[www]
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 200

pm.status_path = /fpm/status
ping.path = /fpm/ping
ping.response = pong

catch_workers_output = yes
decorate_workers_output = no
clear_env = no
chdir = .

php_admin_value[error_log] = storage/logs/php-fpm.www.log
php_admin_flag[log_errors] = on
