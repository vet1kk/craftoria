<div class="group flex flex-col gap-4 rounded-2xl border border-stone-100 bg-white p-4 shadow-sm transition-shadow hover:shadow-md sm:flex-row">
  <div class="relative h-48 w-full shrink-0 overflow-hidden rounded-xl bg-stone-100 sm:h-32 sm:w-32">
    <img loading="lazy"
         [ngSrc]="item().imageUrl"
         [alt]="item().name"
         width="320"
         height="240"
         class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110">
    @if (!item().available) {
      <div class="absolute inset-0 flex items-center justify-center bg-black/60">
        <span class="rounded bg-red-500 px-2 py-1 text-xs font-bold text-white">Немає в наявності</span>
      </div>
    }
  </div>
  <div class="flex min-w-0 flex-1 flex-col">
    <div class="flex-1">
      <h3 class="text-lg font-bold leading-tight text-stone-800">{{ item().name }}</h3>
      <p class="mt-1 line-clamp-2 text-xs text-stone-500 sm:text-sm">{{ item().description }}</p>
    </div>
    <div class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <span class="text-lg font-bold text-stone-900">{{ item().price }} {{ currency() }}</span>
      <button type="button"
              [disabled]="!item().available"
              (click)="addToCart.emit(item())"
              class="w-full rounded-lg bg-orange-100 px-3 py-2 text-sm font-semibold text-orange-700 transition-all hover:bg-orange-600 hover:text-white disabled:cursor-not-allowed disabled:opacity-50 active:scale-95 sm:w-auto sm:px-4">
        <span>Додати +</span>
      </button>
    </div>
  </div>
</div>
