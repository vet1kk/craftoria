<div class="max-w-4xl mx-auto px-4 py-8 pb-20">
  <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <h1 class="text-2xl font-bold text-stone-800">Панель адміністратора</h1>
    <app-admin-tabs [activeTab]="activeTab()" (tabChange)="activeTab.set($event)"></app-admin-tabs>
  </div>

  <div class="mb-6 rounded-2xl border border-amber-200 bg-amber-50 px-5 py-4 text-sm text-amber-900">
    {{ backendNotice }}
  </div>

  @if (activeTab() === 'items') {
    <app-admin-menu-items-panel [menuItems]="dataService.menuItems"
                                [categories]="dataService.categories"
                                [currency]="dataService.appSettings.currency">
    </app-admin-menu-items-panel>
  }

  @if (activeTab() === 'categories') {
    <app-admin-categories-panel [categories]="dataService.categories"></app-admin-categories-panel>
  }
</div>
