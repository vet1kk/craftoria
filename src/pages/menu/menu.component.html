<div class="pb-24">
  <app-menu-hero></app-menu-hero>

  <app-menu-category-filter
    [categories]="dataService.categories"
    [selectedCategory]="selectedCategory()"
    (categoryChange)="selectedCategory.set($event)">
  </app-menu-category-filter>

  <div class="max-w-4xl mx-auto px-4 py-8">
    @if (filteredItems().length === 0) {
      <div class="text-center py-20 text-stone-400">
        <p class="text-lg">У цій категорії поки немає позицій.</p>
      </div>
    } @else {
      <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        @for (item of filteredItems(); track item.id) {
          <app-menu-item-card
            [item]="item"
            [currency]="dataService.appSettings.currency"
            (addToCart)="cartService.addToCart($event)">
          </app-menu-item-card>
        }
      </div>
    }
  </div>
</div>
